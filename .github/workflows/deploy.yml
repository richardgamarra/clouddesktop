name: Deploy to OVH

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to clouddesktop.infoplay.com
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OVH_SSH_HOST }}
          port: ${{ secrets.OVH_SSH_PORT }}
          username: ${{ secrets.OVH_SSH_USER }}
          password: ${{ secrets.OVH_SSH_PASSWORD }}
          command_timeout: 10m
          script: |
            bash /var/www/clouddesktop/scripts/deploy.sh
